<script>
const slides=[
{id:"s1",num:"Slide 1",numcls:"sn-p",title:"Title slide",
content:`
<div class="label">Slide title (big text, center)</div>
<div class="content-box"><b>Socially-Aware Trajectory Prediction for Vulnerable Road Users</b><br>Protecting Pedestrians, Cyclists & Motorcyclists with 6-Second AI Foresight</div>
<div class="label">Subtitle line</div>
<div class="content-box">High-Speed Transformer-Based Multi-Modal Path Prediction · nuScenes Dataset · Real-Time Capable</div>
<div class="label">Team / event info</div>
<div class="content-box">Your team name · Hackathon name · Date</div>
<div class="tip"><b>Design tip:</b> Use a BEV map image as the slide background (faded, low opacity). Show 3 coloured trajectory lines curving out from a pedestrian dot. This is visually striking and immediately communicates what the project does before anyone reads a word.</div>
`},
{id:"s2",num:"Slide 2",numcls:"sn-c",title:"Problem statement & real-world impact",
content:`
<div class="label">Opening stat (large, bold — make it hurt)</div>
<div class="three">
<div class="stat"><div class="stat-n">1.35M</div><div class="stat-l">People die on roads every year globally</div></div>
<div class="stat"><div class="stat-n">50%+</div><div class="stat-l">Are VRUs — pedestrians, cyclists, motorcyclists</div></div>
<div class="stat"><div class="stat-n">167m</div><div class="stat-l">Braking distance at 100 km/h over 6 seconds</div></div>
</div>
<div class="label">The core problem statement (put this verbatim)</div>
<div class="content-box">Autonomous vehicles are reactive. They detect danger and then brake. But at highway speed, by the time a pedestrian is detected, there is no time left to stop safely.<br><br>The missing capability is <b>foresight</b> — knowing where a pedestrian will be in 6 seconds, not just where they are now.</div>
<div class="label">Why VRUs specifically?</div>
<div class="bullet-box"><ul>
<li>Pedestrians, cyclists, and motorcyclists have the most <b>unpredictable movement patterns</b> — they can stop, turn, or reverse direction instantly</li>
<li>They have <b>zero physical protection</b> in a collision — no airbag, no crumple zone</li>
<li>Current AV systems are optimised for vehicle-to-vehicle prediction, not VRU behaviour</li>
</ul></div>
<div class="win">Judge impact line: "We are not solving a benchmark problem. We are solving the reason people die."</div>
`},
{id:"s3",num:"Slide 3",numcls:"sn-b",title:"Objective of the challenge",
content:`
<div class="label">Challenge objective (clear and precise)</div>
<div class="content-box">Build a trajectory prediction system that:<br><br>
<b>1.</b> Predicts the future paths of VRUs — pedestrians, cyclists, motorcycles<br>
<b>2.</b> Generates <b>3 diverse possible futures</b> per agent, 6 seconds (12 timesteps) ahead<br>
<b>3.</b> Operates with <b>social awareness</b> — accounting for all other road users within 50 metres<br>
<b>4.</b> Runs fast enough for <b>real-time AV deployment</b><br>
<b>5.</b> Validated on the <b>nuScenes industry-standard dataset</b></div>
<div class="label">Why 3 modes and not more?</div>
<div class="content-box">A pedestrian has 3 fundamentally different futures at any decision point:<br><br>
<b>Mode 1 — Continue:</b> Carries on current trajectory (straight, crossing road)<br>
<b>Mode 2 — Deviate:</b> Turns, changes speed, steps sideways<br>
<b>Mode 3 — Reverse:</b> Stops, steps back, hesitates<br><br>
More than 3 modes creates redundant overlapping paths with no new information. The AV planner only needs coverage of genuinely distinct physical futures. 3 is the industry standard (nuScenes benchmarks at minADE@3).</div>
<div class="tip"><b>If a judge asks "why not 5 or 6 modes?"</b> — say: "Beyond 3, predicted paths begin to overlap and represent the same physical behaviour. We maximise diversity within 3 modes using a mode-pushing loss term that penalises similar predictions."</div>
`},
{id:"s4",num:"Slide 4",numcls:"sn-b",title:"Computer vision pipeline overview",
content:`
<div class="label">Block diagram — describe each stage for your slide</div>
<div class="content-box">
<b>Full pipeline (left to right on slide):</b><br><br>
[Camera / LIDAR] → [Preprocessing] → [Object Detection CV] → [Multi-Object Tracking] → [XY Coordinates] → [YOUR TRANSFORMER] → [3 Trajectory Modes] → [BEV Map Visualisation]<br><br>
Draw this as a horizontal flow with a clear visual break between the CV perception stages and your model. Use one colour for the CV stage boxes and a different colour for your model box — this instantly shows what is "standard industry stack" vs "your innovation."
</div>
<div class="label">Stage 1 — CV perception (upstream, industry standard)</div>
<div class="content-box">
<b>Input:</b> Raw camera frames + LIDAR point cloud from AV sensors<br>
<b>Preprocessing:</b> Image normalisation, point cloud voxelisation, sensor fusion<br>
<b>Object Detection:</b> CNN backbone (YOLO / ResNet) — detects VRU bounding boxes in each frame<br>
<b>Tracking:</b> DeepSORT / ByteTrack — links detections across frames into stable agent trajectories<br>
<b>Output to our model:</b> Sequence of [X, Y] world coordinates per tracked VRU
</div>
<div class="label">Stage 2 — Your prediction system (your innovation)</div>
<div class="content-box">
<b>Input:</b> 4 recent [X, Y] positions (2 seconds of history) per VRU + all neighbour positions within 50m<br>
<b>Processing:</b> Transformer encoder → Social attention → Goal-conditioned decoder<br>
<b>Output:</b> 3 diverse trajectory modes × 12 timesteps = 3 possible 6-second futures per agent
</div>
<div class="warn"><b>Key point to say out loud:</b> "In our hackathon implementation, nuScenes provides ground truth coordinates directly — so we trained and evaluated without running a live CV stack. In a real vehicle, Stage 1 feeds Stage 2 seamlessly. We deliberately decoupled them so our prediction model works with any upstream tracker."</div>
`},
{id:"s5",num:"Slide 5",numcls:"sn-b",title:"Step-by-step workflow",
content:`
<div class="label">Step-by-step — show this as a numbered vertical flow or stepper on slide</div>
<div class="content-box">
<b>Step 1 — Data ingestion</b><br>
Extract [X, Y] global coordinates from nuScenes sample_annotation.json. Filter to VRU categories only: pedestrian, bicycle, motorcycle. Load instance and category metadata to group annotations by agent identity across timesteps.
</div>
<div class="content-box">
<b>Step 2 — Feature engineering (kinematic math)</b><br>
For each agent, compute: velocity vector between consecutive positions, sine and cosine of heading angle (angular arc), speed magnitude. Convert to ego-centric frame (relative to agent's current position). Build neighbour matrix: for each agent at each timestep, find all other agents within 50m radius.
</div>
<div class="content-box">
<b>Step 3 — Data augmentation</b><br>
Random rotation (0–360°) of full scene, random X-axis reflection, Gaussian noise on coordinates (simulates tracking jitter), random speed scaling. This teaches robustness without needing more real data.
</div>
<div class="content-box">
<b>Step 4 — Transformer training (train.py)</b><br>
Input: 4-step kinematic sequence + social neighbour context. Encoder produces scene representation. Decoder predicts 6-second goal endpoint, then renders 12-step path. 3 modes generated with mode-diversity loss. Total loss = ADE loss + goal loss + diversity penalty. Trained for 50 epochs on GPU.
</div>
<div class="content-box">
<b>Step 5 — Evaluation (evaluate.py)</b><br>
Run model on held-out test scenes. Compute ADE, FDE, Miss Rate against ground truth. Report minADE@3 and minFDE@3 (best mode per prediction). Generate benchmark comparison table.
</div>
<div class="content-box">
<b>Step 6 — Streamlit interactive demo (app.py)</b><br>
User types custom (X, Y) coordinate points. System scales and encodes kinematic history. Social attention computed to nearby nuScenes neighbours. 3 predicted paths plotted as coloured curves on actual HD BEV map tile from dataset. Live interaction — change input, see different predictions.
</div>
`},
{id:"s6",num:"Slide 6",numcls:"sn-p",title:"Core algorithms & architecture",
content:`
<div class="label">Architecture overview (this is your technical centrepiece slide)</div>
<div class="content-box"><b>Why Transformer, not LSTM or CNN?</b><br><br>
LSTM processes timesteps sequentially — each step only sees the previous hidden state. Over 12 timesteps, early motion context fades (vanishing gradient). Transformer self-attention sees all 12 timesteps simultaneously, learning long-range movement dependencies directly. No information loss.</div>
<div class="label">The 4 algorithmic innovations — one per bullet point on slide</div>
<div class="content-box">
<b>1. Custom temporal positional encoding:</b> Standard transformers don't understand time order. Our TPE encodes velocity magnitude, sine/cosine of heading angle, and timestep index — giving the model a physics-aware understanding of motion geometry, not just sequence position.
</div>
<div class="content-box">
<b>2. Social attention pooling (50m radius):</b> Uses MultiheadAttention across all agents in the scene. Distance between agents is the attention weight — closer agents influence predictions more. A pedestrian about to cross in front of a cyclist gets high mutual attention. Result: predicted paths never collide with neighbours.
</div>
<div class="content-box">
<b>3. Goal-conditioned decoding:</b> Two-stage prediction. Stage A: predict the final 6-second physical endpoint (where does this person end up?). Stage B: render the continuous 12-step path from current position to that goal. This eliminates error accumulation — the model knows the destination before plotting the route.
</div>
<div class="content-box">
<b>4. Multi-modal prediction with diversity loss:</b> 3 independent decoder heads each predict one mode. A mode-pushing loss term penalises two heads for predicting similar paths — forcing genuine diversity. The AV planner then selects the mode representing the most dangerous scenario to plan against.
</div>
<div class="label">Full tech stack</div>
<div class="two">
<div class="content-box"><b>ML stack</b><br>PyTorch · nn.TransformerEncoder · nn.MultiheadAttention · Custom positional encoding · Adam optimiser · GPU CUDA training</div>
<div class="content-box"><b>Data & app stack</b><br>nuScenes devkit · Python · NumPy · Streamlit · Matplotlib / PIL for BEV rendering · JSON parsing pipeline</div>
</div>
`},
{id:"s7",num:"Slide 7",numcls:"sn-a",title:"Data & training strategy",
content:`
<div class="label">Dataset</div>
<div class="content-box">
<b>Dataset:</b> nuScenes v1.0-mini (Motional / MIT) — industry-standard autonomous driving benchmark<br>
<b>Scenes:</b> 850 training scenes, 150 validation scenes — 20 seconds each, Boston + Singapore locations<br>
<b>VRU targets:</b> Pedestrian, bicycle, motorcycle categories only (filtered from full annotation set)<br>
<b>Files used:</b> category.json · instance.json · sample_annotation.json<br>
<b>Why nuScenes?</b> Used by Waymo, Motional, Zoox for AV research. Results are directly comparable to published papers.
</div>
<div class="label">Preprocessing steps</div>
<div class="bullet-box"><ul>
<li>Extract raw global [X, Y] coordinates per VRU per timestep from annotation JSON</li>
<li>Compute velocity vector and heading angle between consecutive positions</li>
<li>Normalise to ego-centric frame — relative position from current agent location</li>
<li>Build 50m neighbour matrix at each timestep — all other agents within radius</li>
<li>Slide window into (4 input steps, 12 output steps) training sequences</li>
</ul></div>
<div class="label">Data augmentation</div>
<div class="two">
<div class="bullet-box"><ul>
<li>Random scene rotation 0–360°</li>
<li>Random X-axis reflection (left/right flip)</li>
</ul></div>
<div class="bullet-box"><ul>
<li>Gaussian coordinate noise (tracking jitter simulation)</li>
<li>Random speed scaling (fast/slow agent generalisation)</li>
</ul></div>
</div>
<div class="label">Train / validation / test split</div>
<div class="content-box"><b>Split at scene level, not sample level</b> — prevents data leakage between train and test<br>70% train · 15% validation · 15% test<br><br>Scene-level split means no timesteps from the same physical scene appear in both train and test. This is the correct split for trajectory prediction — sample-level splitting would leak future context.</div>
<div class="label">Training hardware</div>
<div class="content-box">GPU-accelerated training via PyTorch CUDA · 50 epochs · Loss = ADE loss + goal endpoint loss + multi-mode diversity penalty · Adam optimiser with learning rate scheduling</div>
`},
{id:"s8",num:"Slide 8",numcls:"sn-t",title:"Real-time processing & performance",
content:`
<div class="label">The core efficiency argument — this is your killer slide</div>
<div class="content-box"><b>"Math over Pixels" — our deliberate architectural decision</b><br><br>
A CNN processing a camera frame: input = 224×224×3 = ~150,000 floating point numbers. Inference time: 20–50ms per frame.<br><br>
Our model: input = 4 positions × 2 coordinates = <b>8 floating point numbers</b>. Inference time: <b>under 1ms</b>.<br><br>
We are not slower than image-based systems. We are 20–50× faster at the prediction stage.</div>
<div class="three">
<div class="stat"><div class="stat-n">&lt;1ms</div><div class="stat-l">Prediction inference latency (coordinate input)</div></div>
<div class="stat"><div class="stat-n">100+</div><div class="stat-l">Agents processed per single batched forward pass</div></div>
<div class="stat"><div class="stat-n">50m</div><div class="stat-l">Social awareness radius around each agent</div></div>
</div>
<div class="label">Edge deployment capability</div>
<div class="content-box">
<b>Model size:</b> Compact Transformer encoder — no ResNet-scale parameter count. Deployable on NVIDIA Jetson Nano / Xavier class embedded hardware used in production AVs.<br>
<b>No GPU required at inference:</b> Coordinate arrays are CPU-feasible. GPU gives further speedup but is not mandatory.<br>
<b>Memory footprint:</b> Input tensors are kilobytes, not megabytes. Entire inference pipeline fits in embedded compute budget.
</div>
<div class="label">Robustness — say these clearly to judges</div>
<div class="content-box">
<b>Against noise:</b> Gaussian noise augmentation during training means small tracking errors from the upstream CV detector don't corrupt predictions. Model learned to denoise kinematic history.<br><br>
<b>Against lighting variation:</b> Our model never sees pixels. Rain, night, glare, lens flare — completely irrelevant. The upstream CV tracker handles lighting. Our model only sees coordinates.<br><br>
<b>Against occlusion:</b> If a pedestrian disappears for 1–2 frames, velocity and angular history interpolate the gap. Social attention also captures the occluding agent's movement — indirect awareness of the occluded agent's context.
</div>
`},
{id:"s9",num:"Slide 9",numcls:"sn-g",title:"Evaluation metrics",
content:`
<div class="label">Your 5 metrics — define each on slide</div>
<div class="content-box">
<b>ADE — Average Displacement Error</b><br>
Average Euclidean distance (metres) between predicted and actual position across ALL 12 timesteps. Measures how closely your path tracks reality throughout the full 6-second horizon. Lower = better.
</div>
<div class="content-box">
<b>FDE — Final Displacement Error</b><br>
Euclidean distance between predicted and actual position at timestep 12 only (the 6-second endpoint). Measures goal accuracy — did the model correctly predict where this person ended up? This is the most safety-critical metric. Lower = better.
</div>
<div class="content-box">
<b>Miss Rate (threshold 2.0m)</b><br>
Percentage of predictions where the best mode's FDE exceeds 2.0 metres. Directly measures catastrophic failures — the cases where the AV would have been blindsided. Lower = better.
</div>
<div class="content-box">
<b>minADE@3 — Best-of-3 average displacement error</b><br>
For each prediction, take the mode closest to ground truth, compute its ADE. This is the official nuScenes multi-modal benchmark metric. Reflects real AV usage — the planner selects the best matching mode.
</div>
<div class="content-box">
<b>minFDE@3 — Best-of-3 final displacement error</b><br>
Same as above but only at the 6-second endpoint. The primary ranking metric on nuScenes trajectory leaderboard.
</div>
<div class="label">Benchmark context</div>
<div class="content-box">
nuScenes leaderboard state-of-the-art (2024): top models achieve ADE ~0.5–0.8m, FDE ~1.0–1.5m at 6-second horizon.<br><br>
Our model trained on mini dataset (smaller than full training set) — expect higher error numbers but <b>identical architecture</b> to competitive models. With full nuScenes training, our architecture targets sub-1m ADE.<br><br>
<b>Report your actual numbers</b> from evaluate.py — do not fake or estimate. Judges will ask to see the terminal output.
</div>
`},
{id:"s10",num:"Slide 10",numcls:"sn-p",title:"Results & visualisation — your demo slide",
content:`
<div class="label">What to show on this slide — this is your most important visual</div>
<div class="content-box">
<b>Primary visual: BEV map with 3 predicted trajectories</b><br><br>
Show a screenshot from your Streamlit app — the actual nuScenes HD map tile with 3 coloured trajectory curves overlaid. Use distinct colours:<br>
• Mode 1 (continue) — Blue curve<br>
• Mode 2 (deviate) — Orange curve<br>
• Mode 3 (reverse/slow) — Red curve<br>
• Ground truth actual path — Green dashed line<br>
• Agent start position — White dot<br><br>
This is the only visualisation you need. It is immediately understood. It is more powerful than any chart or graph.
</div>
<div class="label">Why BEV map and not a chart?</div>
<div class="content-box">
A line chart of X vs Y is abstract — judges have to mentally reconstruct spatial meaning. A BEV map is reality — judges see the road, the junction, the crossing, and the 3 futures laid over it. No translation needed. The spatial story is instant.<br><br>
Secondary visual (small, beside the map): A simple table of your metric numbers — ADE, FDE, Miss Rate, minADE@3, minFDE@3. Two columns: your model vs a simple baseline (constant velocity model). This shows relative improvement without needing a competitor to compare against.
</div>
<div class="label">Metric results table format</div>
<div class="content-box">
| Metric | Constant velocity baseline | Our transformer |<br>
| minADE@3 | ~X.XX m | Your number |<br>
| minFDE@3 | ~X.XX m | Your number |<br>
| Miss Rate | ~XX% | Your number |<br><br>
Run the constant velocity baseline yourself (predict the next N steps assuming same speed and direction) — takes 10 lines of code and gives you a meaningful comparison without needing another trained model.
</div>
<div class="win">The slide layout: BEV map screenshot takes 70% of the slide width. Metric table takes 30% on the right. One sentence below: "Our model correctly predicted the pedestrian's 6-second future path within X metres on average."</div>
`},
{id:"s11",num:"Slide 11",numcls:"sn-g",title:"Conclusion & future work",
content:`
<div class="label">Conclusion — 3 sentences maximum, put them verbatim on slide</div>
<div class="content-box">
"We built a production-realistic trajectory prediction system that gives autonomous vehicles a 6-second window of foresight for the most vulnerable people on the road.<br><br>
By operating on kinematic coordinates rather than raw pixels, our Transformer runs 20–50× faster than image-based approaches — making it deployable at the edge of a real vehicle's compute stack.<br><br>
With Social Attention Pooling, Goal-Conditioned Decoding, and 3-mode diverse prediction, our architecture matches the design philosophy of state-of-the-art research while being validated on an industry-standard benchmark."
</div>
<div class="label">Future work (shows judges you understand the bigger picture)</div>
<div class="bullet-box"><ul>
<li><b>Scale to full nuScenes dataset</b> — expect ADE improvement from mini to full training</li>
<li><b>Integrate with live YOLO tracker</b> — close the loop from camera to prediction in real hardware</li>
<li><b>Map-conditioned prediction</b> — incorporate HD map lane and crossing geometry as additional context signal</li>
<li><b>Uncertainty quantification</b> — output confidence scores per mode so AV planner can weight by likelihood</li>
<li><b>Edge deployment benchmark</b> — measure actual inference latency on Jetson Xavier hardware</li>
</ul></div>
<div class="label">Closing line for live presentation</div>
<div class="quote">"Roads are dangerous not because cars are fast — but because they are blind to the future. We gave them eyes for what's coming. <b>6 seconds of foresight. That's enough to save a life.</b>"</div>
`}
];

function init(){
  const nav=document.getElementById('nav');
  const pages=document.getElementById('pages');
  slides.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='nb'+(i===0?' on':'');
    btn.textContent=s.num;
    btn.onclick=()=>{
      document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
      document.getElementById('pg-'+s.id).classList.add('on');
    };
    nav.appendChild(btn);
    const pg=document.createElement('div');
    pg.className='pg'+(i===0?' on':'');
    pg.id='pg-'+s.id;
    pg.innerHTML=`
      <div class="slide-card">
        <div class="slide-header">
          <span class="slide-num ${s.numcls}">${s.num}</span>
          <span class="slide-title">${s.title}</span>
        </div>
        <div class="slide-body">${s.content}</div>
      </div>`;
    pages.appendChild(pg);
  });
}
init();
</script>
